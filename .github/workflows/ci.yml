name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: helpdesk
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup test environment
        run: |
          cp .env.test .env.test.local
          echo 'DATABASE_URL="mysql://root:root@127.0.0.1:3306/helpdesk?serverVersion=8.0&charset=utf8mb4"' >> .env.test.local

      - name: Create test database and run migrations
        env:
          APP_ENV: test
        run: |
          php bin/console doctrine:database:create --if-not-exists
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run unit tests
        run: php bin/phpunit tests/Unit/ --colors=never

      - name: Run functional tests
        run: php bin/phpunit tests/Functional/ --colors=never

      - name: Build Docker image
        run: docker build -t helpdesk:ci .

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag helpdesk:ci ghcr.io/${{ github.repository_owner }}/helpdesk:latest
          docker push ghcr.io/${{ github.repository_owner }}/helpdesk:latest
